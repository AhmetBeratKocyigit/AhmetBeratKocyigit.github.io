<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küçük Prens Okuyucu (Ultra HD Modu)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { max-width: 550px; width: 100%; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; font-size: 22px; color: #38bdf8; margin: 0 0 15px 0; }
        
        /* Kamera Alanı */
        #reader { width: 100%; max-width: 450px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #38bdf8; }
        
        .panel { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
        .progress-bar { background: #475569; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #10b981; width: 0%; height: 100%; transition: width 0.2s; }
        
        .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }
        .chip { padding: 3px 6px; background: #475569; font-size: 10px; border-radius: 4px; font-weight: bold; color: #94a3b8; }
        .chip.active { background: #10b981; color: white; }
        
        .btn { display: block; width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; margin-bottom: 15px; transition: background 0.2s; }
        .btn:hover { background: #7dd3fc; }
        
        #story-output { margin-top: 20px; padding: 25px; background: #fffdf5; color: #1e293b; border-left: 5px solid #0284c7; border-radius: 8px; line-height: 1.7; font-size: 16px; display: none; max-height: 450px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>📚 Küçük Prens Okuyucu (HD Kamera Modu)</h1>
    
    <button id="start-btn" class="btn">📷 Kamerayı Başlat (HD)</button>
    <div id="reader"></div>
    
    <div class="panel">
        <div id="status-text" style="font-weight: bold; color: #e2e8f0;">Butona basarak kamerayı HD modda başlatın...</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="chips" id="chips-wrapper"></div>
    </div>
    
    <div id="story-output"></div>
</div>

<script>
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    const chipsWrapper = document.getElementById('chips-wrapper');
    const storyOutput = document.getElementById('story-output');
    const startBtn = document.getElementById('start-btn');

    let receivedChunks = {}; 
    let totalChunksExpected = 0;
    let isFinished = false;
    let html5QrCode;
    let lastScannedText = ""; // Aynı kodun üst üste okunmasını engellemek için filtre

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        statusText.style.color = "#e2e8f0";
        statusText.innerText = "⚡ Tarayıcı motoru ayağa kalkıyor, HD kalitesi isteniyor...";
        
        html5QrCode = new Html5Qrcode("reader");
        
        // DOĞRU MÜHENDİSLİK AYARI: Çözünürlük kısıtlamaları doğrudan ilk parametreye verilir
        const cameraConstraints = {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        };

        const config = {
            fps: 20, // Mobil cihazların aşırı ısınmaması ve donmaması için 20 FPS idealdir
            qrbox: { width: 260, height: 260 } // Ekranda hizalamayı kolaylaştıran kılavuz kutu açar
        };

        // Kamerayı kurallara uygun başlatıyoruz
        html5QrCode.start(cameraConstraints, config, onScanSuccess, onScanFailure)
        .then(() => {
            statusText.style.color = "#38bdf8";
            statusText.innerText = "🎯 1080p HD Kamera Aktif! QR kodları ekrandaki kutuya ortalayarak gösterin.";
        })
        .catch(err => {
            statusText.style.color = "#f43f5e";
            statusText.innerText = "❌ Kamera açma hatası: " + err;
            startBtn.style.display = 'block';
        });
    });

    // Her boş karede tetiklenen hata fonksiyonu (Konsolu kirletmemesi için boş bırakıldı)
    function onScanFailure(error) {}

    // Kamera bir QR yakaladığında tetiklenen fonksiyon
    async function onScanSuccess(decodedText) {
        if (isFinished) return;
        
        let rawStr = String(decodedText).trim();
        
        // Hızlı ardışık okumalarda aynı kareyi tekrar tekrar işlemeyi engelle
        if (rawStr === lastScannedText) return;
        lastScannedText = rawStr;

        // Protokol kontrolü (Hatalı bir QR gösterilirse kullanıcıyı uyarır)
        if (!rawStr.includes('/') || !rawStr.includes('|')) {
            statusText.style.color = "#f59e0b";
            statusText.innerText = "⚠️ QR Kod algılandı fakat kitap formatına (X/Y|veri) uygun değil!";
            return;
        }

        try {
            const parts = rawStr.split('|');
            if (parts.length < 2) return;

            const meta = parts[0].split('/');
            const payload = parts[1];

            const currentIndex = parseInt(meta[0]);
            const totalChunks = parseInt(meta[1]);

            if (isNaN(currentIndex) || isNaN(totalChunks)) {
                statusText.style.color = "#f43f5e";
                statusText.innerText = "❌ Geçersiz index yapısı!";
                return;
            }

            // İlk parça okunduğunda arayüzü dinamik inşa et
            if (totalChunksExpected === 0) {
                totalChunksExpected = totalChunks;
                chipsWrapper.innerHTML = '';
                for (let i = 0; i < totalChunks; i++) {
                    chipsWrapper.innerHTML += `<div class="chip" id="chip-${i}">P-${i+1}</div>`;
                }
            }

            // Yeni bir parça geldiyse hafızaya yaz ve arayüzü güncelle
            if (!receivedChunks.hasOwnProperty(currentIndex)) {
                receivedChunks[currentIndex] = payload;
                
                const currentChip = document.getElementById(`chip-${currentIndex}`);
                if (currentChip) currentChip.classList.add('active');
                
                const currentCount = Object.keys(receivedChunks).length;
                const percentage = (currentCount / totalChunksExpected) * 100;
                
                progressFill.style.width = `${percentage}%`;
                statusText.style.color = "#10b981";
                statusText.innerText = `🧩 İlerleme: ${currentCount} / ${totalChunksExpected} parça toplandı. (${currentIndex + 1}. parça alındı)`;

                // Tüm parçalar bittiğinde birleştir ve decompress et
                if (currentCount === totalChunksExpected) {
                    isFinished = true;
                    statusText.style.color = "#38bdf8";
                    statusText.innerText = "⚡ Tüm parçalar hafızaya alındı! Kitap birleştiriliyor...";
                    
                    // Kamerayı güvenle kapatıyoruz
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                    }).catch(err => console.error("Kamera durdurulamadı:", err));

                    await decompressAndShow();
                }
            } else {
                // Zaten taranmış parça uyarısı
                statusText.style.color = "#94a3b8";
                statusText.innerText = `ℹ️ ${currentIndex + 1}. parça zaten hafızada. Lütfen sonraki parçayı gösterin.`;
            }
        } catch (err) {
            console.error("Parça işleme hatası: ", err);
            statusText.style.color = "#f43f5e";
            statusText.innerText = "❌ Veri ayrıştırılırken teknik bir hata oluştu!";
        }
    }

    // Binary decompress ve ekrana basma motoru
    async function decompressAndShow() {
        try {
            let fullBase64 = "";
            for (let i = 0; i < totalChunksExpected; i++) {
                fullBase64 += receivedChunks[i];
            }

            // Base64 metinden .bin (Binary Array) yapısına geri dönüş
            const binaryString = atob(fullBase64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Tarayıcının gömülü native decompress motoru
            const stream = new Response(bytes).body.pipeThrough(new DecompressionStream("deflate-raw"));
            const tamMetin = await new Response(stream).text();

            statusText.style.color = "#10b981";
            statusText.innerText = "🎉 MÜKEMMEL! Küçük Prens fiziksel piksellerden başarıyla ayağa kaldırıldı.";
            storyOutput.style.display = "block";
            storyOutput.innerText = tamMetin;
        } catch (e) {
            statusText.style.color = "#f43f5e";
            statusText.innerText = "❌ Sıkıştırma açılırken teknik bir hata oluştu! QR kodlarındaki binary veri hatalı oluşturulmuş olabilir.";
            console.error(e);
        }
    }
</script>
</body>
</html>
