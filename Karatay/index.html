<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karatay Medresesi | Sanal Tur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --accent: #f59e0b;
            --bg-dark: #000000;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --vh: 1vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .desktop-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            background-color: var(--bg-dark);
            position: relative;
            overflow: hidden;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        }

        @media (min-width: 768px) {
            .app-container {
                max-width: 380px;
                height: 85vh;
                max-height: 820px;
                border-radius: 45px;
                border: 14px solid #050505;
                box-shadow:
                    0 0 2px 1px rgba(255, 255, 255, 0.1),
                    0 30px 60px rgba(0, 0, 0, 0.8),
                    inset 0 0 10px rgba(0, 0, 0, 0.5);
                overflow: hidden;
            }
            .app-container::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 140px;
                height: 30px;
                background: #050505;
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px;
                z-index: 1000;
            }
        }
        .hero {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 3rem;
        }
        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("assets/images/arka-plan.png") no-repeat center top/cover;
            z-index: 0;
        }

        .hero-image::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.6) 80%, rgba(0, 0, 0, 0.8) 100%);
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 2rem;
            width: 100%;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(245, 158, 11, 0.15));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.05);
            z-index: 50;
            white-space: nowrap;
        }

        .badge i {
            color: var(--primary);
            font-size: 1rem;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        h1 strong {
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.05rem;
            color: #e2e8f0;
            margin-bottom: 2.5rem;
            line-height: 1.7;
            font-weight: 300;
            letter-spacing: 0.5px;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-style: italic;
            opacity: 0.9;
        }
        .visualizer-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 3.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
        }

        .play-btn {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            animation: breathe-slow 4s ease-in-out infinite;
        }

        @keyframes breathe-slow {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }
        .visualizer-wrapper::before,
        .visualizer-wrapper::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid var(--primary);
            opacity: 0;
            pointer-events: none;
        }

        .visualizer-wrapper.playing::before {
            animation: ripple-out 2s cubic-bezier(0.23, 1, 0.32, 1) infinite;
        }

        .visualizer-wrapper.playing::after {
            animation: ripple-out 2s cubic-bezier(0.23, 1, 0.32, 1) infinite 1s;
        }

        @keyframes ripple-out {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .visualizer-wrapper:active .play-btn {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.15);
        }

        @media (hover: hover) {
            .visualizer-wrapper:hover .play-btn {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.3);
            }
        }
        .cta-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 1.35rem;
            background: var(--primary);
            color: #020617;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .cta-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px var(--primary-glow);
            background: #7dd3fc;
        }

        .cta-btn:hover::after {
            left: 100%;
        }

        .cta-btn i {
            width: 28px;
            height: 28px;
            background: #020617;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .cta-btn:hover i {
            transform: translateX(6px) rotate(-45deg);
            background: #fff;
            color: #020617;
        }
        .desktop-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: white;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 300;
            border: 1px solid var(--glass-border);
            display: none;
            z-index: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .desktop-hint i {
            color: var(--primary);
            margin-left: 8px;
        }

        @media (min-width: 768px) {
            .desktop-hint {
                display: flex;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <div class="desktop-bg"></div>
    <div class="desktop-hint">Mobil cihazdan taratın <i class="fas fa-qrcode"></i></div>

    <div class="app-container">
        <div class="badge"><i class="fas fa-headphones-alt"></i> Sanal Rehber</div>
        <div class="hero-image"></div>
        <div class="hero">
            <div class="content">
                <p class="subtitle">Selçuklu’nun Gök Bilmini Taşın Sabrıyla ve Çininin Mavisiyle Nakşettiği Kadim Bilgelik Kapısını Aralayın.</p>

                <div class="visualizer-wrapper" id="visualizerContainer">
                    <button class="play-btn" id="playBtn">
                        <i class="fas fa-play" style="margin-left: 3px;"></i>
                    </button>
                </div>

                <a href="oda_planı.html" class="cta-btn">
                    Tura Başla <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
        <audio id="audio" src="assets/audio/muzik.mp3"></audio>
    </div>

    <script>
        function setViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setViewportHeight();
        window.addEventListener('resize', setViewportHeight);

        const playBtn = document.getElementById("playBtn");
        const audio = document.getElementById("audio");
        const container = document.getElementById("visualizerContainer");
        let isPlaying = false;

        container.addEventListener("click", () => {
            if (!isPlaying) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
                container.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play" style="margin-left: 3px;"></i>';
                isPlaying = false;
                container.classList.remove('playing');
            }
        });

    </script>
</body>

</html>
